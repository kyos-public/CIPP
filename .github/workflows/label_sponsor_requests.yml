name: Label Issues
on:
  issues:
    types:
      - opened
jobs:
  label_issues_bugs:
    if: github.repository_owner == 'KelvinTegelaar' && contains(github.event.issue.title, 'Bug')
    runs-on: ubuntu-slim
    permissions:
      issues: write
    steps:
      - name: Sponsor Labels
        uses: JasonEtco/is-sponsor-label-action@565f3cb67b3518a8aae36c3f0bce9e8513430e84 # v2.0.0
        with:
          label: "Sponsor Priority"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
