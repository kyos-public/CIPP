name: CIPP Frontend Dev Build

on:
  push:
    branches:
      - dev
  workflow_dispatch:

jobs:
  build:
    if: github.event.repository.fork == false
    name: Build and Upload CIPP Frontend
    runs-on: ubuntu-latest

    steps:
      # Checkout the repository
      - name: Checkout Code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      # Set up Node.js
      - name: Get Node version
        id: get_node_version
        run: |
          node_raw_version=$(node -p "require('./package.json').engines.node")
          node_sanitized_version=$(echo $node_raw_version | sed -E 's/[^0-9.]+//g')
          echo "node_version=$node_sanitized_version" >> $GITHUB_OUTPUT

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ steps.get_node_version.outputs.node_version }}

      # Install dependencies
      - name: Install Dependencies
        run: yarn install

      # Build the project
      - name: Build Project
        run: npm run build

      # Update version.json with commit hash
      - name: Update version.json
        run: |
          VERSION=$(jq -r '.version' public/version.json)
          SHORT_SHA="${GITHUB_SHA::7}"
          echo "{\"version\": \"${VERSION}\", \"commit\": \"${SHORT_SHA}\"}" > out/version.json

      # Create ZIP File in a New Source Directory
      - name: Prepare and Zip Build Files
        run: |
          mkdir -p build
          cp staticwebapp.config.json out/
          zip -r build/dev.zip out

      # Upload to Azure Blob Storage
      - name: Azure Blob Upload
        uses: LanceMcCarthy/Action-AzureBlobUpload@c07e2c217316ad2dd2c6d990ac183a063c87d5e9 # v3.12.0
        with:
          connection_string: ${{ secrets.AZURE_CONNECTION_STRING }}
          container_name: cipp
          source_folder: build/
          destination_folder: /
          delete_if_exists: true
